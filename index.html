<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Opname Report</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#eef2f7;
  color:#222;
}

.header{
  background:linear-gradient(135deg,#0d47ff,#00aaff);
  color:white;
  padding:18px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.header h1{
  margin:0;
  font-size:28px;
}

.header p{
  margin:4px 0 0;
  opacity:.9;
}

.container{
  padding:14px;
}

.control{
  background:white;
  padding:14px;
  border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  margin-bottom:14px;
}

input{
  padding:12px;
  border-radius:10px;
  border:1px solid #dcdcdc;
  font-size:14px;
  background:#fafafa;
}

button{
  border:none;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:600;
}

.btn-blue{
  background:#0d47ff;
}

.btn-green{
  background:#2e7d32;
}

.btn-orange{
  background:#ff9800;
}

.table-wrap{
  background:white;
  border-radius:14px;
  overflow:auto;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:650px;
}

th{
  background:#f8fafc;
  position:sticky;
  top:0;
}

th,td{
  border:1px solid #e5e7eb;
  padding:10px;
  white-space:nowrap;
}

tbody tr:nth-child(even){
  background:#fafafa;
}

.col-rack{
  text-align:center;
  font-weight:bold;
}

.col-rupiah{
  text-align:right;
  font-size:15px;
  font-weight:bold;
}

.numeric{
  text-align:right;
}

.plus{
  color:#16a34a;
}

.minus{
  color:#dc2626;
}

.summary{
  margin-top:14px;
  background:white;
  padding:16px;
  border-radius:14px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:20px;
  font-weight:bold;
}

.loading{
  padding:20px;
  text-align:center;
  color:#666;
}

</style>

</head>

<body>

<div class="header">

<h1>STOCK OPNAME REPORT</h1>

<p>
Monitoring Selisih Stock Opname
</p>

</div>

<div class="container">

<div class="control">

<input
  type="text"
  id="storeId"
  placeholder="Kode Toko"
  readonly
>

<input
  type="date"
  id="dateSo"
>

<input
  type="text"
  id="searchInput"
  placeholder="Cari PLU / Nama Barang"
  onkeyup="filterTable()"
>

<button
  class="btn-blue"
  onclick="loadData()"
>
Tampilkan
</button>

<button
  class="btn-green"
  onclick="exportExcel()"
>
Export Excel
</button>

<button
  class="btn-orange"
  onclick="sortSelisih()"
>
Filter Rupiah Terbesar
</button>

</div>

<div class="table-wrap">

<table id="table-so">

<thead>

<tr>

<th>PLU</th>
<th>Nama Barang</th>
<th>Rack</th>
<th>QTY Fisik</th>
<th>Selisih Rupiah</th>

</tr>

</thead>

<tbody></tbody>

</table>

<div
  class="loading"
  id="loading"
  style="display:none"
>
Mengambil data...
</div>

</div>

<div class="summary">

<div>
TOTAL SELISIH RUPIAH
</div>

<div id="totalRupiah">
Rp 0
</div>

</div>

</div>

<script>

window.onload = ()=>{

  document
  .getElementById('dateSo')
  .valueAsDate = new Date();

  const store =
  localStorage.getItem('storeId');

  if(store){

    document
    .getElementById('storeId')
    .value = store;

  }

};

function formatDate(date){

  const d = new Date(date);

  const dd =
  String(d.getDate())
  .padStart(2,'0');

  const mm =
  String(d.getMonth()+1)
  .padStart(2,'0');

  const yyyy =
  d.getFullYear();

  return `${dd}-${mm}-${yyyy}`;

}

async function loadData(){

  const tbody =
  document.querySelector(
    '#table-so tbody'
  );

  tbody.innerHTML = '';

  document
  .getElementById('loading')
  .style.display = 'block';

  const storeId =
  document
  .getElementById('storeId')
  .value
  .trim();

  const dateVal =
  document
  .getElementById('dateSo')
  .value;

  if(!storeId || !dateVal){

    alert(
      'Kode toko & tanggal wajib diisi'
    );

    return;

  }

  const dateSo =
  formatDate(dateVal);

  try{

    const res =
    await fetch(

      `/api/so?storeId=${storeId}&dateSo=${dateSo}&typeSo=GRAND`

    );

    const html =
    await res.text();

    const doc =
    new DOMParser()
    .parseFromString(
      html,
      'text/html'
    );

    const rows =
    doc.querySelectorAll(
      'table.datatable tbody tr'
    );

    let total = 0;

    rows.forEach(r=>{

      const td =
      r.querySelectorAll('td');

      if(td.length === 0){
        return;
      }

      const plu =
      td[0]?.innerText.trim() || '';

      const nama =
      td[1]?.innerText.trim() || '';

      if(
        plu.includes('TOTAL') ||
        nama.includes('TOTAL')
      ){
        return;
      }

      const rack =
      td[5]?.innerText.trim() || '';

      const qtyFisik =
      td[6]?.innerText.trim() || '0';

      const selisihText =
      td[td.length-1]
      ?.innerText
      .trim() || '0';

      const selisih =
      parseFloat(
        selisihText.replace(/,/g,'')
      ) || 0;

      if(selisih === 0){
        return;
      }

      total += selisih;

      const tr =
      document.createElement('tr');

      tr.innerHTML = `

        <td class="numeric">
          ${plu}
        </td>

        <td>
          ${nama}
        </td>

        <td class="col-rack">
          ${rack}
        </td>

        <td class="numeric">
          ${qtyFisik}
        </td>

        <td class="col-rupiah ${selisih < 0 ? 'minus':'plus'}">
          ${selisihText}
        </td>

      `;

      tbody.appendChild(tr);

    });

    document
    .getElementById('totalRupiah')
    .innerHTML = `
      Rp ${total.toLocaleString('id-ID')}
    `;

  }catch(err){

    alert('Gagal ambil data');

    console.error(err);

  }

  document
  .getElementById('loading')
  .style.display = 'none';

}

function filterTable(){

  const keyword =
  document
  .getElementById('searchInput')
  .value
  .toLowerCase();

  document
  .querySelectorAll(
    '#table-so tbody tr'
  )
  .forEach(tr=>{

    tr.style.display =

    tr.innerText
    .toLowerCase()
    .includes(keyword)

    ? ''

    : 'none';

  });

}

function sortSelisih(){

  const tbody =
  document.querySelector(
    '#table-so tbody'
  );

  const rows =
  Array.from(
    tbody.querySelectorAll('tr')
  );

  rows.sort((a,b)=>{

    const aVal =
    Math.abs(
      parseFloat(
        a.children[4]
        .innerText
        .replace(/,/g,'')
      )
    );

    const bVal =
    Math.abs(
      parseFloat(
        b.children[4]
        .innerText
        .replace(/,/g,'')
      )
    );

    return bVal - aVal;

  });

  rows.forEach(r=>{

    tbody.appendChild(r);

  });

}

function exportExcel(){

  const table =
  document.getElementById(
    'table-so'
  );

  const wb =
  XLSX.utils.table_to_book(
    table
  );

  XLSX.writeFile(
    wb,
    'SO_REPORT.xlsx'
  );

}

</script>

</body>
</html>
