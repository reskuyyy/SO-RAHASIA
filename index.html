<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stock Opname Report</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:10px;
  font-family:Inter,Arial,sans-serif;
  background:#eef2f7;
  color:#222;
}

.container{
  width:100%;
  max-width:1400px;
  margin:auto;
}

.card{
  background:white;
  border-radius:18px;
  padding:14px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

/* HEADER */

.header{
  margin-bottom:16px;
}

.header h1{
  margin:0;
  font-size:24px;
}

.header p{
  margin-top:4px;
  color:#666;
  font-size:13px;
}

/* TOOLBAR */

.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

input{
  padding:12px;
  border-radius:12px;
  border:1px solid #dcdcdc;
  background:#fafafa;
  font-size:14px;
  flex:1;
  min-width:140px;
}

input:focus{
  outline:none;
  border-color:#4361ee;
  background:white;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-1px);
}

.btn-blue{
  background:#4361ee;
  color:white;
}

.btn-green{
  background:#2a9d8f;
  color:white;
}

/* TABLE */

.table-wrapper{
  width:100%;
  overflow-x:auto;
  border-radius:14px;
  border:1px solid #e5e7eb;
  background:white;
}

/* scrollbar */

.table-wrapper::-webkit-scrollbar{
  height:8px;
}

.table-wrapper::-webkit-scrollbar-thumb{
  background:#cbd5e1;
  border-radius:20px;
}

table{
  width:max-content;
  min-width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th{
  background:#f8fafc;
  color:#333;
  position:sticky;
  top:0;
  z-index:10;
}

th,
td{
  border:1px solid #e5e7eb;
  padding:7px 12px;
  text-align:left;
  white-space:nowrap;
  vertical-align:middle;
}

/* zebra */

tr:nth-child(even){
  background:#fafafa;
}

tr:hover{
  background:#edf2ff;
}

/* warna */

.positive{
  color:#16a34a;
  font-weight:bold;
}

.negative{
  color:#dc2626;
  font-weight:bold;
}

/* hidden */

.hidden-row{
  display:none;
}

/* summary */

.summary-card{

  margin-top:16px;

  padding:16px;

  border-radius:14px;

  background:#f8fafc;

  border:1px solid #e5e7eb;

  display:flex;

  justify-content:space-between;

  align-items:center;

  font-weight:bold;

  font-size:18px;

}

.summary-value-positive{
  color:#16a34a;
}

.summary-value-negative{
  color:#dc2626;
}

/* MOBILE */

@media(max-width:768px){

  body{
    padding:6px;
  }

  .card{
    padding:10px;
  }

  .toolbar{
    flex-direction:column;
  }

  input,
  button{
    width:100%;
  }

  table{
    font-size:11px;
  }

  th,
  td{
    padding:6px 10px;
  }

  .summary-card{

    font-size:14px;

    flex-direction:column;

    gap:8px;

    align-items:flex-start;

  }

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<h1>Stock Opname Report</h1>

<p>
Monitoring Selisih Stock Opname
</p>

</div>

<div class="toolbar">

<input
  type="text"
  id="storeId"
  value="N497"
  placeholder="Kode Toko"
>

<input
  type="date"
  id="dateSo"
>

<button
  class="btn-blue"
  onclick="loadData()"
>
Tampilkan
</button>

<button
  class="btn-green"
  onclick="exportExcel()"
>
Export Excel
</button>

</div>

<div
  class="table-wrapper"
  id="result"
></div>

<div
  id="summaryContainer"
></div>

</div>

</div>

<script>

function formatDate(dateValue){

  const d = new Date(dateValue);

  const day =
    String(d.getDate()).padStart(2,'0');

  const month =
    String(d.getMonth()+1).padStart(2,'0');

  const year =
    d.getFullYear();

  return `${day}-${month}-${year}`;

}

async function loadData(){

  const result =
    document.getElementById('result');

  const summary =
    document.getElementById(
      'summaryContainer'
    );

  const storeId =
    document.getElementById('storeId').value;

  const dateInput =
    document.getElementById('dateSo').value;

  if(!dateInput){

    alert('Tanggal wajib diisi');

    return;

  }

  const dateSo =
    formatDate(dateInput);

  result.innerHTML =
    '<p>Loading...</p>';

  summary.innerHTML = '';

  try{

    const url =
      `/api/so?storeId=${storeId}&dateSo=${dateSo}&typeSo=GRAND`;

    const response =
      await fetch(url);

    const html =
      await response.text();

    result.innerHTML =
      html;

    processTable();

  }catch(err){

    result.innerHTML =
      err.message;

  }

}

function processTable(){

  const rows =
    document.querySelectorAll('tr');

  let grandTotal = 0;

  rows.forEach(row=>{

    const cells =
      row.querySelectorAll('td');

    // skip row aneh
    if(cells.length < 5){
      return;
    }

    // hide conv columns
    if(cells[2]){

      cells[2].style.display =
        'none';

    }

    if(cells[3]){

      cells[3].style.display =
        'none';

    }

    // ambil selisih rupiah
    const lastCell =
      cells[cells.length - 1];

    const rawText =
      lastCell.innerText.trim();

    // parsing format indo
    const cleanValue =
      rawText
      .replace(/\./g,'')
      .replace(',', '.')
      .replace(/[^\d.-]/g,'');

    const value =
      parseFloat(cleanValue);

    // skip bukan angka
    if(isNaN(value)){
      return;
    }

    // skip total bawaan api
    const rowText =
      row.innerText.toUpperCase();

    if(
      rowText.includes('TOTAL') ||
      rowText.includes('GRAND')
    ){
      return;
    }

    // hitung total
    grandTotal += value;

    // hide selisih 0
    if(value === 0){

      row.classList.add(
        'hidden-row'
      );

    }

    // warna
    if(value > 0){

      lastCell.classList.add(
        'positive'
      );

    }

    if(value < 0){

      lastCell.classList.add(
        'negative'
      );

    }

  });

  // summary total

  const summary =
    document.getElementById(
      'summaryContainer'
    );

  summary.innerHTML = `

    <div class="summary-card">

      <div>
        GRAND TOTAL SELISIH
      </div>

      <div class="${
        grandTotal >= 0
        ? 'summary-value-positive'
        : 'summary-value-negative'
      }">

        Rp ${grandTotal.toLocaleString(
          'id-ID',
          {
            minimumFractionDigits:2
          }
        )}

      </div>

    </div>

  `;

}

function exportExcel(){

  const table =
    document.querySelector('table');

  if(!table){

    alert('Belum ada data');

    return;

  }

  const clone =
    table.cloneNode(true);

  clone
    .querySelectorAll('.hidden-row')
    .forEach(row=>row.remove());

  const wb =
    XLSX.utils.table_to_book(clone);

  XLSX.writeFile(
    wb,
    'SO_REPORT.xlsx'
  );

}

</script>

</body>
</html>
